<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>買うことアプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>買うこと アプリ</h1>

    <!-- 評価ボタン（タッチで色がつく想定） -->
    <div class="evaluation-buttons">
        <button class="eval-btn" data-eval="double-circle">すごく良かった ◎</button>
        <button class="eval-btn" data-eval="circle">まあまあ良かった ◯</button>
        <button class="eval-btn" data-eval="triangle">いまいち △</button>
        <button class="eval-btn" data-eval="cross">ダメだった ×</button>
    </div>

    <!-- 並び替えメニュー -->
    <div class="sort-section">
        
        <select id="sort-order">
            <option>カメラでとった順</option>
            <option>日付順</option>
            <option>評価順</option>
        </select>
    </div>

    <!-- 買い物リスト本体 -->
    <ul class="shopping-list">
        <!-- リストアイテムの例 -->
        <li class="list-item">
            <input type="text" placeholder="ここに入力してください">
            <div class="image-box">
                <img src="https://via.placeholder.com" alt="カメラ画像">
            </div>
        </li>
        <li class="list-item">
            <input type="text" placeholder="ここに入力してください">

            <div class="image-box">
                <img src="https://via.placeholder.com" alt="カメラ画像"><!-- ここにカメラ画像が入る -->
            </div>
        
        </li>
        </li>
        <li class="list-item">
            <input type="text" placeholder="ここに入力してください">

            <div class="image-box">
                <img src="https://via.placeholder.com" alt="カメラ画像"><!-- ここにカメラ画像が入る -->
            </div>
        </li>
        </li>
        <li class="list-item">
            <input type="text" placeholder="ここに入力してください">

            <div class="image-box">
                <img src="https://via.placeholder.com" alt="カメラ画像"><!-- ここにカメラ画像が入る -->
            </div>
        </li>
    </ul>
    <div class="menu">
        <div>📷</div>
        <div>🍖</div>
        <div>🐟</div>
        <div>🍎</div>
        <div>🥦</div>
        <div>☕️</div>
        
    
    </div>

</body>
</html>
