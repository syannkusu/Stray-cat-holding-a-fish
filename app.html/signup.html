<div class="container">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>新規登録 - Merchandise ☀</title>
    </head>
    
    <h1>Join Us ☀</h1>
    <p style="color: #666; margin-bottom: 20px;">アカウントを作成して始めましょう</p>

    <form action="register_process.php" method="POST">
        <div class="form-group">
            <label for="username">ユーザー名</label>
            <input type="text" id="username" name="username" placeholder="お名前" required>
        </div>

        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" name="password" placeholder="8文字以上の英数字" minlength="8" required>
        </div>

        <button type="submit" class="btn btn-primary">アカウント作成</button>

        <p class="switch-link">
            すでにアカウントをお持ちですか？
            <a href="merchandise.html">ログイン</a>
        </p>
    </form>
</div>
