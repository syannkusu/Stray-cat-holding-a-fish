<!DOCTYPE html>
<html lang="ja">
<form action="merchandise.html">
<head>
    <meta charset="UTF-8">
    <title>merchandise</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <h1>merchandise</h1>
    <div class="evaluation-buttons">
        <button class="eval-btn" data-eval="double-circle">すごく良かった ◎</button>
        <button class="eval-btn" data-eval="circle">まあまあ良かった ◯</button>
        <button class="eval-btn" data-eval="triangle">いまいち △</button>
        <button class="eval-btn" data-eval="cross">ダメだった ×</button>
    </div>
    <!-- (以下、お持ちのリストコードをそのまま貼り付け) -->
    <ul class="shopping-list">
        <li class="list-item">
            <input type="text" placeholder="ここに入力してください">
            <div class="image-box"><img src="https://via.placeholder.com" alt="カメラ画像"></div>
        </li>
    </ul>
</body>
</form>
</html>
